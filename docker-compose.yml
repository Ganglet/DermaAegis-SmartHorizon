version: '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: derma_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - ENVIRONMENT=development
      - MODEL_PATH=models/cnn_model.keras
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: derma_frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
